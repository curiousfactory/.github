name: Add to VIP Arena Project + set Component

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

concurrency:
  group: project-sync-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.CF_APP_ID }}
          private-key: ${{ secrets.CF_APP_PRIVATE_KEY }}
          owner: curiousfactory

      - uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e  # v1.0.2
        id: add
        with:
          project-url: https://github.com/orgs/curiousfactory/projects/1
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Checkout ci-workflows scripts
        if: steps.add.outputs.itemId
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: curiousfactory/ci-workflows
          ref: 507efa136babef2433e1dcb71cb17b53713c7990
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        if: steps.add.outputs.itemId
        with:
          node-version: 24

      - name: Install deps
        if: steps.add.outputs.itemId
        run: npm install --no-save @octokit/rest@^21

      - name: Set Component field
        if: steps.add.outputs.itemId
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ITEM_ID: ${{ steps.add.outputs.itemId }}
        run: node scripts/set-component-field.mjs
