name: 🐛 Bug interne (dev only)
description: Pour les bugs purement dev/infra qui n'entrent pas dans le ticketing produit Notion. Pour bugs produit (Cipher, Hydra, etc.) → Notion.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **⚠️ Avant d'ouvrir cette issue** : si c'est un bug produit (Cipher editor, Hydra engine, etc.), utilise plutôt Notion → 🍹 VIP Arena → 📋 Tickets → "🐛 Reporter un bug".

        Cette issue GitHub est réservée aux bugs purement dev/infra (CI, Docker, scripts) qui n'ont pas de sens dans Notion.

  - type: input
    id: repo
    attributes:
      label: Repo concerné
      placeholder: "ex: curiousfactory-ui, ci-workflows, curiousfactory-engine"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      placeholder: Que faisais-tu ? Qu'est-ce qui s'est passé ? Qu'est-ce qui aurait dû se passer ?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      placeholder: "OS, version Node/Go/Python, branche git, commit SHA si pertinent"
